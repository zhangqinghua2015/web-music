<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash YAML 转换工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 16px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        .input-row { display: flex; margin-bottom: 10px; align-items: center; }
        .input-row label { margin-bottom: 0; white-space: nowrap; }
        .input-wrapper { display: flex; flex: 1; border: 2px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        .input-wrapper:focus-within { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        select { padding: 12px 16px; border: none; font-size: 14px; min-width: 120px; background: transparent; color: #333; cursor: pointer; border-right: 1px solid #e0e0e0; }
        select:focus { outline: none; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: none; font-size: 15px; min-width: 0; }
        input[type="text"]:focus { outline: none; }
        textarea { width: 100%; height: 300px; padding: 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: 'Monaco', 'Menlo', monospace; font-size: 14px; resize: vertical; }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn { display: inline-block; padding: 14px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.2s; white-space: nowrap; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .result { margin-top: 30px; display: none; }
        .result.show { display: block; }
        .info { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 16px; margin-bottom: 16px; color: #0369a1; }
        #output { height: 400px; }
        .error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; color: #dc2626; margin-top: 20px; display: none; }
        .error.show { display: block; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            body { padding: 12px; }
            h1 { font-size: 1.3rem; }
            .card { padding: 16px; }
            .input-wrapper { flex-direction: column; border: none; gap: 10px; }
            select { width: 100%; border-radius: 8px; border: 2px solid #e0e0e0; border-right: none; }
            input[type="text"] { width: 100%; border-radius: 8px; border: 2px solid #e0e0e0; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
            #output { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Clash YAML 转换工具</h1>
        <div class="card">
            <div class="input-group">
                <label>选择代理服务器</label>
                <div class="input-row">
                    <div class="input-wrapper">
                        <select id="proxy">
                            <option value="4">codetabs</option>
                            <option value="0">allorigins</option>
                            <option value="1">corsproxy.io</option>
                            <option value="2">corsproxy.org</option>
                            <option value="5">rs-proxy</option>
                            <option value="6">jina.ai</option>
                        </select>
                        <input type="text" id="url" placeholder="输入订阅地址 URL">
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn" id="convertBtn" onclick="convert()">转换</button>
                <button class="btn" id="downloadBtn" onclick="download()" style="display: none;">下载 YAML</button>
                <button class="btn" id="shareBtn" onclick="shareLink()" style="display: none;">复制链接</button>
            </div>
            <div class="error" id="error"></div>
            <div class="result" id="result">
                <div class="info" id="info"></div>
                <textarea id="output" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        let currentYaml = '';

        const CORS_PROXIES = [
            url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            url => `https://corsproxy.org/?${encodeURIComponent(url)}`,
            url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
            url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            url => `https://rs-proxy.vercel.app/api?url=${encodeURIComponent(url)}`,
            url => `https://r.jina.ai/http://${url.replace(/^https?:\/\//, '')}`,
        ];

       

        const TEMPLATE_URL = 'mihomo_template.yaml';

        function fetchWithProxy(url) {
            const idx = document.getElementById('proxy').value;
            return fetch(CORS_PROXIES[idx](url)).then(r => r.ok ? r.text() : Promise.reject('请求失败'));
        }

        function decodeBase64(str) {
            const binary = atob(str);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new TextDecoder('utf-8', { fatal: false }).decode(bytes);
        }

        function parseVmess(str) {
            try {
                const decoded = decodeBase64(str);
                const obj = JSON.parse(decoded);
                const result = {
                    type: 'vmess',
                    server: obj.add,
                    port: parseInt(obj.port),
                    uuid: obj.id,
                    alterId: obj.aid || 0,
                    network: obj.net || 'tcp'
                };
                if (obj.ps) {
                    result.name = obj.ps;
                } else if (obj.add) {
                    result.name = obj.add;
                }
                if (obj.scy) result.cipher = obj.scy;
                if (obj.tls === 'true' || obj.tls === true) result.tls = true;
                return result;
            } catch (e) { return null; }
        }

        function parseTrojan(url) {
            try {
                const match = url.match(/trojan:\/\/([^@]+)@([^:]+):(\d+)/);
                if (match) {
                    const result = {
                        type: 'trojan',
                        server: match[2],
                        port: parseInt(match[3]),
                        password: match[1]
                    };
                    const idx = url.indexOf('?');
                    if (idx > -1) {
                        const params = new URLSearchParams(url.substring(idx + 1));
                        const nameMatch = url.match(/#([^#]+)$/);
                        if (nameMatch) result.name = decodeURIComponent(nameMatch[1]);
                        if (params.get('sni')) result.sni = params.get('sni');
                        if (params.get('allowInsecure')) result['skip-cert-verify'] = params.get('allowInsecure') === '1';
                        if (params.get('network') === 'ws') {
                            result.network = 'ws';
                            if (params.get('path') || params.get('host')) {
                                result['ws-opts'] = {};
                                if (params.get('path')) result['ws-opts'].path = decodeURIComponent(params.get('path'));
                                if (params.get('host')) result['ws-opts'].headers = { Host: params.get('host') };
                            }
                        }
                        result.udp = true;
                    }
                    return result;
                }
            } catch (e) { return null; }
        }

        function parseSS(url) {
            try {
                const match = url.match(/ss:\/\/([A-Za-z0-9+/=]+)@([^:]+):(\d+)/);
                if (match) {
                    const decoded = atob(match[1]);
                    const idx = decoded.indexOf(':');
                    const result = {
                        type: 'ss',
                        server: match[2],
                        port: parseInt(match[3]),
                        cipher: decoded.substring(0, idx),
                        password: decoded.substring(idx + 1)
                    };
                    const nameMatch = url.match(/#([^#]+)$/);
                    if (nameMatch) result.name = decodeURIComponent(nameMatch[1]);
                    return result;
                }
            } catch (e) { return null; }
        }


        function parseVLESS(url) {
            try {
                const match = url.match(/vless:\/\/([^@]+)@([^:]+):(\d+)/);
                if (match) {
                    const params = new URLSearchParams(url.split('?')[1] || '');
                    const result = {
                        type: 'vless',
                        server: match[2],
                        port: parseInt(match[3]),
                        uuid: match[1],
                        network: params.get('network') || 'tcp',
                        tls: params.get('tls') === 'true' || params.get('tls') === '1' || params.get('security') === 'tls'
                    };
                    if (params.get('flow')) result.flow = params.get('flow');
                    if (params.get('sni')) result.servername = params.get('sni');
                    if (params.get('path')) {
                        result['ws-opts'] = {
                            path: decodeURIComponent(params.get('path')),
                            headers: { Host: params.get('host') || '' }
                        };
                    }
                    const nameMatch = url.match(/#([^#]+)$/);
                    if (nameMatch) result.name = decodeURIComponent(nameMatch[1]);
                    return result;
                }
            } catch (e) { return null; }
        }

        function parseLineToProxy(line) {
            line = line.trim();
            if (!line) return null;
            if (line.startsWith('vmess://')) return parseVmess(line.substring(8));
            if (line.startsWith('trojan://')) return parseTrojan(line);
            if (line.startsWith('ss://')) return parseSS(line);
            if (line.startsWith('vless://')) return parseVLESS(line);
            return null;
        }

        function tryParseContent(content) {
            content = content.trim();
            try {
                const data = jsyaml.load(content);
                if (data && data.proxies) return data;
            } catch (e) {}
            try {
                const decoded = atob(content);
                const parsed = jsyaml.load(decoded);
                if (parsed && parsed.proxies) return parsed;
            } catch (e) {}
            const decoded = atob(content);
            // 对decoded进行url decode
            const decodedUrl = decodeURIComponent(decoded);
            const lines = decodedUrl.split('\n').filter(l => l.trim().startsWith('vmess://') || l.trim().startsWith('trojan://') || l.trim().startsWith('ss://') || l.trim().startsWith('vless://'));
            if (lines.length > 0) {
                const proxies = lines.map(parseLineToProxy).filter(p => p !== null);
                if (proxies.length > 0) return { proxies };
            }
            return null;
        }

        async function convert() {
            const btn = document.getElementById('convertBtn'), err = document.getElementById('error'), res = document.getElementById('result'), info = document.getElementById('info'), out = document.getElementById('output'), dl = document.getElementById('downloadBtn');
            err.classList.remove('show'); res.classList.remove('show');
            const url = document.getElementById('url').value.trim();
            if (!url) { showError('请输入URL'); return; }
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>处理中...';
            try {
                const yamlContent = await fetchWithProxy(url);
                const data = tryParseContent(yamlContent);
               
                if (!data || !data.proxies || !Array.isArray(data.proxies)) {
                    throw new Error('未找到proxies节点，请检查URL是否正确');
                }

                const proxies = data.proxies;
                proxies.sort((a, b) => a.name.localeCompare(b.name));
                
                const templateRes = await fetch(TEMPLATE_URL);
                const templateContent = await templateRes.text();
                const template = jsyaml.load(templateContent);
                template.proxies = proxies;
                
                const proxyGroups = data['proxy-groups'];
            
                if (proxyGroups) {
                    template['proxy-groups'].push(...proxyGroups);
                    template['proxy-groups'].forEach(g => {
                        if (g.name === '🚀 节点选择' || g.name === '🌍 国外媒体' || g.name === '📲 电报信息' || g.name === 'Ⓜ️ 微软服务' || g.name === '🍎 苹果服务') {
                            g.proxies.push(...proxyGroups.map(p => p.name));
                        }
                    });
                } else {
                    // 手动添加自动选择节点
                    template['proxy-groups'].push({
                        name: '♻️ 自动选择',
                        type: 'url-test',
                        proxies: proxies.map(p => p.name),
                        url: 'http://www.gstatic.com/generate_204',
                        interval: 300,
                        tolerance: 50
                    });
                    template['proxy-groups'].forEach(g => {
                        if (g.name === '🚀 节点选择') {
                            g.proxies.push(...proxies.map(p => p.name));
                        }
                        if (g.name === '🌍 国外媒体' || g.name === '📲 电报信息' || g.name === 'Ⓜ️ 微软服务' || g.name === '🍎 苹果服务') {
                            g.proxies.push('♻️ 自动选择');
                        }
                    });
                    
                }

                currentYaml = jsyaml.dump(template, { allowUnicode: true, flowLevel: -1 });
                
                out.value = currentYaml; info.textContent = `✅ 成功提取 ${proxies.length} 个节点`;
                res.classList.add('show'); dl.style.display = 'inline-block';
                document.getElementById('shareBtn').style.display = 'inline-block';

            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '转换';
            }
        }

        function showError(msg) { const el = document.getElementById('error'); el.textContent = msg; el.classList.add('show'); }

        function download() {
            if (!currentYaml) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([currentYaml], { type: 'text/yaml' }));
            a.download = 'clash.yaml';
            a.click();
        }

        async function shareLink() {
            if (!currentYaml) return;
            const btn = document.getElementById('shareBtn');
            try {
                btn.disabled = true;
                btn.textContent = '生成中...';
                const formData = new FormData();
                formData.append('file', new File([currentYaml], 'clash.yaml', { type: 'text/plain' }));
                const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.status === 'success' && result.data && result.data.url) {
                    const downloadUrl = result.data.url.replace(/^http:\/\/tmpfiles\.org\//, 'http://tmpfiles.org/dl/');
                    try {
                        await navigator.clipboard.writeText(downloadUrl);
                        btn.textContent = '已复制!';
                    } catch (e) {
                        prompt('链接已生成，请复制：', downloadUrl);
                        btn.textContent = '已生成!';
                    }
                } else {
                    showError('生成链接失败，请下载文件：' + result.message);
                }
            } catch (e) {
                showError('生成链接失败，请下载文件：' + e.message);
            } finally {
                setTimeout(() => { btn.textContent = '复制链接'; btn.disabled = false; }, 10000);
            }
        }

        document.getElementById('url').addEventListener('keypress', e => { if (e.key === 'Enter') convert(); });
     </script>
</body>
</html>
